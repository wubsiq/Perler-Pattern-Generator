<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豆师傅 - 拼豆图纸生成器</title>
    <meta name="description" content="豆师傅 - 免费在线拼豆图纸生成器，支持图片转拼豆、自定义编辑、智能颜色优化">
    <meta name="keywords" content="拼豆,拼豆图纸,拼豆生成器,像素艺术,豆师傅">
    <link rel="preload" href="css/style.css" as="style">
    <link rel="stylesheet" href="css/style.css" media="print" onload="this.media='all'">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="header-title">
                    <h1>豆师傅</h1>
                </div>
                <div class="nav-bar">
                    <button class="nav-btn active">图转拼豆</button>
                    <button class="nav-btn">矩阵计时</button>
                </div>
                <div class="language-switch">
                    <button id="langZh" class="lang-btn active">中文</button>
                    <button id="langEn" class="lang-btn">EN</button>
                </div>
            </div>
        </header>

        <div class="upload-section" id="uploadSection">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📷</div>
                <p data-i18n="uploadTitle">点击或拖拽图片到此处上传</p>
                <p class="upload-hint" data-i18n="uploadHint">支持 JPG、PNG、GIF 格式</p>
                <input type="file" id="fileInput" accept="image/*" style="display: none;">
            </div>
        </div>

        <div class="timer-section" id="timerSection" style="display: none;">
            <div class="timer-header">
                <h2>⏱️ 矩阵计时</h2>
                <button class="btn btn-primary" id="addTimerBtn">+ 添加计时器</button>
            </div>
            <div class="timers-grid" id="timersGrid">
                <!-- 计时器会动态生成在这里 -->
            </div>
        </div>

        <div class="modal" id="timerModal" style="display: none;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>添加计时器</h2>
                    <button class="close-btn" id="closeTimerModalBtn">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="modal-hours">小时:</label>
                        <input type="number" id="modal-hours" min="0" max="23" value="0">
                    </div>
                    <div class="form-group">
                        <label for="modal-minutes">分钟:</label>
                        <input type="number" id="modal-minutes" min="0" max="59" value="0">
                    </div>
                    <div class="form-group">
                        <label for="modal-title">标题:</label>
                        <input type="text" id="modal-title" placeholder="计时器标题">
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-primary" id="confirmAddTimerBtn">确认添加</button>
                    <button class="btn btn-secondary" id="cancelAddTimerBtn">取消</button>
                </div>
            </div>
        </div>

        <div class="workspace" id="workspace" style="display: none;">
            
            <div class="preview-section">
                <div class="preview-left">
                    <div class="preview-panel">
                        <h3 data-i18n="originalPreview">原图预览</h3>
                        <div class="canvas-wrapper">
                            <canvas id="originalCanvas"></canvas>
                        </div>
                        <p id="originalSize" class="size-info"></p>
                    </div>
                </div>
                <div class="preview-right">
                    <div class="controls-section">
                        <div class="control-group">
                            <label data-i18n="targetSize">目标尺寸</label>
                            <div class="size-inputs">
                                <div>
                                    <label data-i18n="width">宽度：</label>
                                    <input type="number" id="widthInput" min="16" max="4096">
                                    <span>px</span>
                                </div>
                                <div>
                                    <label data-i18n="height">高度：</label>
                                    <input type="number" id="heightInput" min="16" max="4096">
                                    <span>px</span>
                                </div>
                            </div>
                        </div>
                        <div class="control-group">
                            <label data-i18n="presetSize">预设尺寸</label>
                            <div class="preset-sizes">
                                <button class="preset-btn" data-width="64" data-height="64">64×64</button>
                                <button class="preset-btn" data-width="128" data-height="128">128×128</button>
                                <button class="preset-btn" data-width="256" data-height="256">256×256</button>
                                <button class="preset-btn" data-width="512" data-height="512">512×512</button>
                            </div>
                        </div>
                        <div class="control-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="keepRatioCheckbox" checked>
                                <span data-i18n="keepRatio">保持宽高比</span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mode-switch">
                <button id="simpleModeBtn" class="mode-btn active">简单模式</button>
                <button id="advancedModeBtn" class="mode-btn">高级模式</button>
            </div>

            <div class="preview-section">
                <div class="preview-left">
                    <div class="preview-panel">
                        <h3 data-i18n="pixelatedPreview">像素化预览</h3>
                        <div class="canvas-wrapper">
                            <canvas id="pixelatedCanvas"></canvas>
                        </div>
                        <p id="pixelatedSize" class="size-info"></p>
                        <div class="canvas-zoom-control">
                            <label>
                                <span>缩放：</span>
                                <span id="pixelatedZoomValue">100%</span>
                            </label>
                            <input type="range" id="pixelatedZoomSlider" min="25" max="200" value="100">
                        </div>
                    </div>
                </div>
                <div class="preview-right">
                    <div class="controls-section">
                        <div class="control-group advanced-only">
                            <label><span data-i18n="pixelMethod">像素化方法：</span></label>
                            <select id="pixelMethod">
                                <option value="mosaic" data-i18n-value="pixelMethodMosaic">马赛克化</option>
                                <option value="quantized" data-i18n-value="pixelMethodQuantized">量化像素化（推荐）</option>
                                <option value="pixel-art" data-i18n-value="pixelMethodPixelArt">像素艺术</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>
                                <span data-i18n="pixelSize">像素块大小：</span>
                                <span id="pixelSizeValue">16px</span>
                            </label>
                            <input type="range" id="pixelSizeSlider" min="2" max="64" value="16">
                        </div>
                        <div class="control-group advanced-only" id="quantizedPixelControls">
                            <label>
                                <span>目标颜色数量：</span>
                                <span id="targetColorCountValue">32</span>
                            </label>
                            <div class="color-count-inputs">
                                <input type="range" id="targetColorCountSlider" min="8" max="96" step="4" value="32">
                                <input type="number" id="targetColorCountInput" min="8" max="96" value="32" style="width: 60px; margin-left: 10px;">
                            </div>
                        </div>
                        <div class="control-group advanced-only">
                            <label><span data-i18n="pixelProcessing">像素化后处理：</span></label>
                        </div>
                        <div class="control-group advanced-only">
                            <label class="checkbox-label">
                                <input type="checkbox" id="enableContrast" checked>
                                <span data-i18n="enableContrast">增强对比度</span>
                            </label>
                        </div>
                        <div class="control-group advanced-only">
                            <label>
                                <span data-i18n="contrastLevel">对比度强度：</span>
                                <span id="contrastValue">1.3x</span>
                            </label>
                            <input type="range" id="contrastSlider" min="1.0" max="3.0" step="0.1" value="1.3">
                        </div>
                        <div class="control-group advanced-only">
                            <label class="checkbox-label">
                                <input type="checkbox" id="enableSharpen">
                                <span data-i18n="enableSharpen">图片锐化</span>
                            </label>
                        </div>
                        <div class="control-group advanced-only">
                            <label>
                                <span data-i18n="sharpenLevel">锐化强度：</span>
                                <span id="sharpenValue">0.5</span>
                            </label>
                            <input type="range" id="sharpenSlider" min="0.1" max="2.0" step="0.1" value="0.5">
                        </div>
                        <div class="control-group advanced-only">
                            <label class="checkbox-label">
                                <input type="checkbox" id="enableNeighborSmooth">
                                <span>邻域平滑</span>
                            </label>
                        </div>
                        <div class="control-group advanced-only">
                            <label class="checkbox-label">
                                <input type="checkbox" id="enableColorQuantize">
                                <span data-i18n="enableColorQuantize">颜色量化</span>
                            </label>
                        </div>
                        <div class="control-group advanced-only">
                            <label>
                                <span>保留颜色数量：</span>
                                <span id="colorCountValue">8</span>
                                <span style="color: #888; margin-left: 8px;">(图片实际颜色: <span id="imageTotalColors">0</span>)</span>
                            </label>
                            <div class="color-count-inputs">
                                <input type="range" id="colorCountSlider" min="2" max="256" step="1" value="8">
                                <input type="number" id="colorCountInput" min="2" max="256" value="8" style="width: 60px; margin-left: 10px;">
                            </div>
                        </div>
                        <div class="control-group" id="colorQuantizePanel" style="display: none;">
                            <label><span data-i18n="colorUsage">颜色使用统计：</span></label>
                            <div class="sort-buttons">
                                <button class="sort-btn active" data-sort="count-desc" data-i18n="sortCountDesc">数量降序</button>
                                <button class="sort-btn" data-sort="count-asc" data-i18n="sortCountAsc">数量升序</button>
                                <button class="sort-btn" data-sort="hue" data-i18n="sortHue">色相</button>
                            </div>
                            <div id="colorUsageList" style="max-height: 250px; overflow-y: auto; background: #f8f9fa; border-radius: 6px; padding: 10px;"></div>
                        </div>
                        <div class="action-buttons">
                            <button id="downloadBtn" class="btn btn-primary" data-i18n="downloadPixel">下载像素图</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="preview-section" id="perlerSection">
                <div class="preview-left">
                    <div class="preview-panel" id="perlerPanel">
                        <h3 data-i18n="perlerChart">拼豆图纸</h3>
                        <div id="perlerContent">
                            <div id="perlerChartArea">
                                <div class="perler-chart-wrapper">
                                    <div class="canvas-wrapper">
                                        <canvas id="perlerCanvas"></canvas>
                                    </div>
                                    <p id="perlerSize" class="size-info"></p>
                                    <div class="canvas-zoom-control">
                                        <label>
                                            <span>缩放：</span>
                                            <span id="perlerZoomValue">100%</span>
                                        </label>
                                        <input type="range" id="perlerZoomSlider" min="25" max="200" value="100">
                                    </div>
                                </div>
                            </div>
                            <div id="colorLegendArea"></div>
                        </div>
                    </div>
                </div>
                <div class="preview-right">
                    <div id="perlerOptions" class="controls-section">
                        <div class="control-group advanced-only">
                            <label for="colorSetSelect"><span data-i18n="colorSet">颜色套装：</span></label>
                            <select id="colorSetSelect">
                                <option value="mard291" selected>Mard 291色 (默认)</option>
                                <option value="mard120">Mard 120色</option>
                                <option value="mard72">Mard 72色</option>
                                <option value="mard48">Mard 48色</option>
                                <option value="mard24">Mard 24色</option>
                                <option value="perler24">Perler 24色</option>
                                <option value="perler48">Perler 48色</option>
                                <option value="perler72">Perler 72色</option>
                                <option value="hama">Hama (10色)</option>
                            </select>
                        </div>
                        <div class="control-group advanced-only">
                            <label><span data-i18n="colorMapping">颜色映射方法：</span></label>
                            <select id="colorMappingMethod">
                                <option value="cie2000" data-i18n-value="mappingCie2000">CIEDE2000 (最精确)</option>
                                <option value="cie94" data-i18n-value="mappingCie94">CIE94 (精确)</option>
                                <option value="cie76" data-i18n-value="mappingCie76">CIE76 (Lab)</option>
                                <option value="weighted-rgb" data-i18n-value="mappingWeightedRgb">加权RGB</option>
                                <option value="hsl" data-i18n-value="mappingHsl">HSL色彩空间</option>
                                <option value="hsv" data-i18n-value="mappingHsv">HSV色彩空间</option>
                            </select>
                        </div>
                        <div class="control-group advanced-only">
                            <label><span data-i18n="chartStyle">图纸样式：</span></label>
                            <select id="chartStyle">
                                <option value="color" data-i18n-value="chartStyleColor">彩色图纸</option>
                                <option value="color-with-code" data-i18n-value="chartStyleColorWithCode">彩色图纸（带编号）</option>
                                <option value="bw" data-i18n-value="chartStyleBw">黑白图纸(带编号)</option>
                            </select>
                        </div>
                        <div class="control-group advanced-only">
                            <label><span data-i18n="legendPosition">颜色统计位置：</span></label>
                            <select id="legendPosition">
                                <option value="bottom" data-i18n-value="legendPositionBottom">图纸下方</option>
                                <option value="right" data-i18n-value="legendPositionRight">图纸右侧</option>
                            </select>
                        </div>
                        <div class="control-group advanced-only">
                            <label><span data-i18n="beadShape">拼豆形状：</span></label>
                            <select id="beadShape">
                                <option value="square" data-i18n-value="beadShapeSquare">正方形</option>
                                <option value="circle" data-i18n-value="beadShapeCircle">圆形</option>
                            </select>
                        </div>
                        <div class="control-group">
                            <label>
                                <span data-i18n="beadSize">拼豆大小（显示）：</span>
                                <span id="beadSizeValue">30px</span>
                            </label>
                            <input type="range" id="beadSizeSlider" min="12" max="48" step="2" value="30">
                        </div>
                        <div class="control-group advanced-only">
                            <label>
                                <span>拼豆大小（导出）：</span>
                                <span id="exportBeadSizeValue">60px</span>
                            </label>
                            <input type="range" id="exportBeadSizeSlider" min="30" max="96" step="2" value="60">
                        </div>
                        <div class="control-group advanced-only">
                            <label class="checkbox-label">
                                <input type="checkbox" id="showGridLines" checked>
                                <span data-i18n="showGridLines">显示网格线</span>
                            </label>
                        </div>
                        <div class="control-group advanced-only">
                            <label class="checkbox-label">
                                <input type="checkbox" id="showCoordNumbers" checked>
                                <span data-i18n="showCoordNumbers">显示坐标数字</span>
                            </label>
                        </div>
                        <div class="control-group advanced-only">
                            <label><span data-i18n="coordLineColor">网格线颜色：</span></label>
                            <input type="color" id="coordLineColor" value="#888888">
                        </div>
                        <div class="control-group advanced-only">
                            <label><span data-i18n="coordNumberColor">坐标数字颜色：</span></label>
                            <input type="color" id="coordNumberColor" value="#666666">
                        </div>
                        <div class="control-group advanced-only">
                            <label><span data-i18n="watermarkText">水印文本：</span></label>
                            <input type="text" id="watermarkText" value="豆师傅-perler-pattern-generator.pages.dev" style="width: 100%;">
                        </div>
                        <div class="control-group">
                            <button id="renderPerlerBtn" class="btn btn-primary" data-i18n="renderPerler">🎨 渲染拼豆图纸</button>
                        </div>
                        <div class="control-group">
                            <button id="smartOptimizeBtn" class="btn btn-primary" data-i18n="smartOptimize">🧠 智能优化</button>
                        </div>
                        <div class="control-group">
                            <label>
                                <span>导出高清缩放：</span>
                                <span id="exportScaleValue">1×</span>
                            </label>
                            <div style="display: flex; gap: 10px; align-items: center;">
                                <input type="range" id="exportScaleSlider" min="1" max="16" step="0.5" value="1" style="flex: 1;">
                                <input type="number" id="exportScaleInput" min="1" max="16" step="0.5" value="1" style="width: 70px;">
                            </div>
                        </div>
                        <div class="action-buttons">
                            <button id="downloadPerlerBtn" class="btn btn-primary" data-i18n="downloadPerler">下载拼豆图纸</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="preview-section" id="customEditSection">
                <div class="preview-left">
                    <div class="preview-panel">
                        <h3 data-i18n="customEdit">自定义编辑</h3>
                        <div class="canvas-wrapper">
                            <canvas id="customEditCanvas"></canvas>
                        </div>
                        <p id="customEditInfo" class="size-info"></p>
                    </div>
                </div>
                <div class="preview-right">
                    <div class="controls-section">
                        <div class="control-group">
                            <label><span data-i18n="editTool">编辑工具：</span></label>
                            <div class="edit-tools">
                                <button class="edit-tool-btn active" data-tool="brush" data-i18n="toolBrush">画笔</button>
                                <button class="edit-tool-btn" data-tool="eraser" data-i18n="toolEraser">橡皮擦</button>
                                <button class="edit-tool-btn" data-tool="razor" data-i18n="toolRazor">剃刀</button>
                                <button class="edit-tool-btn" data-tool="chainRazor" data-i18n="toolChainRazor">连锁剃刀</button>
                                <button class="edit-tool-btn" data-tool="fill" data-i18n="toolFill">填充</button>
                                <button class="edit-tool-btn" data-tool="picker" data-i18n="toolPicker">取色器</button>
                                <button class="edit-tool-btn" data-tool="colorConvert">🔄 颜色转换</button>
                            </div>
                        </div>
                        <div class="control-group">
                            <label><span data-i18n="currentColor">当前颜色：</span></label>
                            <div class="current-color-wrapper">
                                <input type="color" id="customEditColor" value="#000000">
                                <span id="currentColorValue">#000000</span>
                            </div>
                        </div>
                        <div class="control-group">
                            <label><span data-i18n="brushSize">画笔大小：</span></label>
                            <input type="range" id="customEditBrushSize" min="1" max="5" step="1" value="1">
                            <span id="brushSizeValue">1</span>
                        </div>
                        <div class="control-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="showCustomEditGrid" checked>
                                <span data-i18n="showCustomEditGrid">显示网格</span>
                            </label>
                        </div>
                        <div class="control-group">
                            <label>橡皮擦颜色：</label>
                            <div class="current-color-wrapper">
                                <input type="color" id="eraserColor" value="#ffffff">
                                <span id="eraserColorValue">#ffffff</span>
                            </div>
                        </div>
                        <div class="control-group">
                            <label>剃刀工具底色：</label>
                            <div class="current-color-wrapper">
                                <input type="color" id="razorBgColor" value="#00ff00">
                                <span id="razorBgColorValue">#00ff00</span>
                            </div>
                        </div>
                        <div class="control-group">
                            <label>连锁最大色块：</label>
                            <div class="current-color-wrapper">
                                <input type="number" id="chainRazorMax" value="1000" min="1" max="10000" style="width: 80px;">
                            </div>
                        </div>
                        <div class="control-group">
                            <button id="applyCustomEditBtn" class="btn btn-primary" data-i18n="applyEdit">✓ 应用编辑</button>
                        </div>
                        <div class="control-group">
                            <button id="undoCustomEditBtn" class="btn btn-secondary" data-i18n="undoEdit">↩ 撤销</button>
                        </div>
                        <div class="control-group">
                            <button id="saveSnapshotBtn" class="btn btn-secondary">💾 保存快照</button>
                        </div>
                        <div class="control-group" id="colorConvertControls" style="display: none;">
                            <label>颜色转换设置：</label>
                            <div style="margin-top: 10px;">
                                <div style="margin-bottom: 10px;">
                                    <label style="font-weight: 600; margin-bottom: 5px; display: block;">源颜色（要替换的颜色）：</label>
                                    <div class="current-color-wrapper">
                                        <input type="color" id="colorConvertSourceColor" value="#ffffff">
                                        <span id="colorConvertSourceColorValue">#ffffff</span>
                                        <button id="pickSourceColorBtn" class="btn btn-secondary" style="margin-left: 10px;">取色</button>
                                    </div>
                                </div>
                                <div style="margin-bottom: 10px;">
                                    <label style="font-weight: 600; margin-bottom: 5px; display: block;">目标颜色（替换后的颜色）：</label>
                                    <div class="current-color-wrapper">
                                        <input type="color" id="colorConvertTargetColor" value="#000000">
                                        <span id="colorConvertTargetColorValue">#000000</span>
                                        <button id="pickTargetColorBtn" class="btn btn-secondary" style="margin-left: 10px;">取色</button>
                                    </div>
                                </div>
                                <button id="executeColorConvertBtn" class="btn btn-primary" style="width: 100%; margin-top: 10px;">▶ 执行颜色转换</button>
                            </div>
                        </div>
                        <div class="control-group" id="snapshotsList" style="display: none;">
                            <label>保存的快照：</label>
                            <div id="snapshotsContainer" style="max-height: 150px; overflow-y: auto; border: 1px solid #ddd; border-radius: 6px; padding: 8px; background: #f8f9fa;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="global-actions">
                <button id="clearBtn" class="btn btn-danger" data-i18n="clear">清空</button>
                <button id="resetBtn" class="btn btn-secondary" data-i18n="reset">重置</button>
            </div>
        </div>
    </div>

    <script src="js/colors.js" defer></script>
    <script src="js/colorUtils.js" defer></script>
    <script src="js/i18n.js" defer></script>
    <script src="js/app.js" defer></script>

    <div id="smartOptimizeModal" class="modal" style="display: none;">
        <div class="modal-content smart-optimize-modal">
            <div class="modal-header">
                <h2 data-i18n="smartOptimizeTitle">🧠 智能颜色优化</h2>
                <button id="closeModalBtn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="optimization-summary" id="optimizationSummary"></div>
                <div class="optimization-settings">
                    <div class="control-group">
                        <label class="checkbox-label">
                            <input type="checkbox" id="enableColorMerge" checked>
                            <span>近似色融合</span>
                        </label>
                    </div>
                    <div class="control-group">
                        <label>
                            <span>融合相似度：</span>
                            <span id="colorMergeThresholdValue">90%</span>
                        </label>
                        <input type="range" id="colorMergeThresholdSlider" min="50" max="100" value="90">
                    </div>
                </div>
                <div class="smart-optimize-container">
                    <div class="optimization-preview">
                        <h3>预览效果</h3>
                        <div class="preview-canvas-wrapper">
                            <canvas id="optimizationPreviewCanvas"></canvas>
                        </div>
                    </div>
                    <div class="suggestions-list" id="suggestionsList"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="rejectAllBtn" class="btn btn-secondary" data-i18n="rejectAll">✗ 全部拒绝</button>
                <button id="applyAllBtn" class="btn btn-primary" data-i18n="applyAll">✓ 全部应用</button>
                <button id="confirmBtn" class="btn btn-primary" data-i18n="confirm">确认</button>
            </div>
        </div>
    </div>
</body>
</html>
